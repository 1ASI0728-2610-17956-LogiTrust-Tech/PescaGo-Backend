spring.application.name=pescago-backend

spring.datasource.url=jdbc:h2:mem:pescago-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

frontend.url=http://localhost:4200

spring.jpa.show-sql=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.naming.physical-strategy=pe.upc.pescagobackend.shared.infrastructure.persistance.jpa.strategy.SnakeCasePhysicalNamingStrategy

jwt.secret=test-jwt-secret-key-minimum-32-characters-long
jwt.issuer=pescago-test
jwt.access-token-ttl=1h
