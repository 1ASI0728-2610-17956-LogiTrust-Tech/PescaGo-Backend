spring.application.name=pescago-backend

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

frontend.url=${FRONTEND_URL}

spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=pe.upc.pescagobackend.shared.infrastructure.persistance.jpa.strategy.SnakeCasePhysicalNamingStrategy

# Flyway — desactivado por defecto; habilitar solo en base PostgreSQL nueva o tras baseline manual aprobado
spring.flyway.enabled=${FLYWAY_ENABLED:false}
spring.flyway.clean-disabled=true
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration
# No usar baseline-on-migrate=true. No ejecutar Flyway contra la base existente sin backup y procedimiento de baseline.

server.port=8080

# JWT — JWT_SECRET is required unless spring.profiles.active includes local or dev
jwt.secret=${JWT_SECRET}
jwt.issuer=${JWT_ISSUER:pescago-api}
jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:1h}

# Blockchain trace (minichain) — disabled by default; non-blocking when enabled
blockchain.enabled=${BLOCKCHAIN_ENABLED:false}
blockchain.base-url=${BLOCKCHAIN_BASE_URL:http://localhost:3001}
blockchain.mine-after-record=${BLOCKCHAIN_MINE_AFTER_RECORD:false}
blockchain.connect-timeout-ms=${BLOCKCHAIN_CONNECT_TIMEOUT_MS:2000}
blockchain.read-timeout-ms=${BLOCKCHAIN_READ_TIMEOUT_MS:3000}