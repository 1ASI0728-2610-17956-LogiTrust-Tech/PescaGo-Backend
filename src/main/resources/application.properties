spring.application.name=pescago-backend

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

frontend.url=${FRONTEND_URL}

spring.jpa.show-sql=true

spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.naming.physical-strategy=pe.upc.pescagobackend.shared.infrastructure.persistance.jpa.strategy.SnakeCasePhysicalNamingStrategy

server.port=8080

# JWT — JWT_SECRET is required unless spring.profiles.active includes local or dev
jwt.secret=${JWT_SECRET}
jwt.issuer=${JWT_ISSUER:pescago-api}
jwt.access-token-ttl=${JWT_ACCESS_TOKEN_TTL:1h}